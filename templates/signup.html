<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sign Up</title>

<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">

<style>
body {
    background:
        linear-gradient(rgba(15, 60, 117, 0.75), rgba(28, 110, 213, 0.75)),
        url("{{ url_for('static', filename='bg.png') }}");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
</style>

</head>
    
<body>

<div class="container">

    <div class="title">
        <h1>Loan Application Prediction</h1>
        <p>Powered by Machine Learning</p>
    </div>

    <div class="card signup-card">

        <h2>Sign Up</h2>

        <form method="POST">

            <div class="input-box">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>

            <div class="input-box">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="password" name="password" required>
                <label>Create Password</label>
            </div>

            <div class="input-box">
                <input type="password" name="confirm_password" required>
                <label>Confirm Password</label>
            </div>

            <button type="submit">Register</button>

        </form>

        {% if error %}
        <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        <p class="switch">
            Already have an account? <a href="/login">Login here</a>
        </p>

    </div>

    <div class="bottom-section">

        <h2>Predict Your Loan Approval Chances Instantly!</h2>

        <div class="features">
            <div class="feature">
                <div class="icon">📊</div>
                <p>Fast Prediction</p>
            </div>

            <div class="feature">
                <div class="icon">🎯</div>
                <p>Accurate Results</p>
            </div>

            <div class="feature">
                <div class="icon">🔒</div>
                <p>Secure & Reliable</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
